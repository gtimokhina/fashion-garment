# Fashion Garment — API + Next.js UI
#
# Usage:
#   cp .env.example .env   # set OPENAI_API_KEY (repo root)
#   docker compose up --build
#
# API: http://localhost:8000   UI: http://localhost:3000
# Tests: docker compose --profile test run --rm test

services:
  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: sqlite:////data/app.db
    volumes:
      - backend_data:/data
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: sqlite:////tmp/pytest.sqlite
      FASHION_GARMENT_SKIP_SEED: "1"
    command: ["pytest", "tests/", "-q"]

volumes:
  backend_data:
  backend_uploads:
